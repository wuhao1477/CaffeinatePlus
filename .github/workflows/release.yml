name: Release

on:
  push:
    tags:
      - 'v*'

env:
  DEVELOPER_DIR: /Applications/Xcode_15.0.app/Contents/Developer

jobs:
  build:
    name: Build Release
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Import Certificates
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          # Import signing certificate
          echo $CERTIFICATE_P12 | base64 --decode > certificate.p12
          security create-keychain -p actions temp.keychain
          security default-keychain -s temp.keychain
          security unlock-keychain -p actions temp.keychain
          security import certificate.p12 -k temp.keychain -P $CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions temp.keychain

      - name: Build Release
        run: |
          swift build -c release

      - name: Create App Bundle
        run: |
          # Package the app
          mkdir -p CaffeinatePlus.app/Contents/MacOS
          mkdir -p CaffeinatePlus.app/Contents/Resources
          cp .build/release/CaffeinatePlus CaffeinatePlus.app/Contents/MacOS/
          cp Configuration/Info.plist CaffeinatePlus.app/Contents/
          # Add icon and resources

      - name: Code Sign
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --sign "$SIGNING_IDENTITY" CaffeinatePlus.app

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # Create zip for notarization
          ditto -c -k --keepParent CaffeinatePlus.app CaffeinatePlus.zip

          # Submit for notarization
          xcrun notarytool submit CaffeinatePlus.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          # Staple the notarization ticket
          xcrun stapler staple CaffeinatePlus.app

      - name: Create DMG
        run: |
          # Create DMG installer
          hdiutil create -volname "Caffeinate+" -srcfolder CaffeinatePlus.app -ov -format UDZO CaffeinatePlus.dmg

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CaffeinatePlus.dmg
            CaffeinatePlus.zip
          body: |
            Release ${{ github.ref_name }}

            ## What's Changed
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Installation
            1. Download `CaffeinatePlus.dmg`
            2. Open the DMG
            3. Drag Caffeinate+ to Applications
            4. Launch from Applications
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Release Notes
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Extract Release Notes
        id: extract_notes
        run: |
          # Extract notes from CHANGELOG.md
          VERSION=${GITHUB_REF#refs/tags/v}
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > notes.md

      - name: Update Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
